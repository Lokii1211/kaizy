<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kaizy — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
    .c{max-width:340px}
    .icon{font-size:64px;margin-bottom:16px}
    h1{font-size:22px;font-weight:800;margin-bottom:8px}
    p{font-size:14px;color:#666;line-height:1.5;margin-bottom:24px}
    button{background:#FF6B00;color:#fff;border:none;padding:14px 32px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
    button:active{transform:scale(0.96)}
  </style>
</head>
<body>
  <div class="c">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again. Your bookings are safe — they'll sync when you're back online.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
